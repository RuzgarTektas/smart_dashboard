<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            max-width: 300px;
            margin: auto;
            margin-top: 50px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        #temp-status, #humidity-status {
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="mb-4 text-center">Oda Durumu</h1>
    
    <div class="card text-center bg-white">
        <div class="card-body">
            <h2 class="display-4">{{ temp }}°C</h2>
            <p class="card-text" id="temp-status">Sıcaklık Normal</p>
            <h3 class="display-5 mt-3">{{ humidity }}%</h3>
            <p class="card-text" id="humidity-status">Nem Normal</p>
        </div>
    </div>
</div>

</body>
</html>
