<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ESP32 İklim Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f2937, #111827);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h2 { font-weight: 700; letter-spacing: 1px; }
        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.7);
        }
        h1 { font-size: 3rem; margin-top: 10px; }
        #chart {
            background: #1f2937;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .temp { color: #ff4d4f; }
        .hum { color: #4da6ff; }
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            #chart { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">🌡️ Sıcaklık & Nem Takip Paneli</h2>
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card bg-secondary text-center p-4">
                <h4>Sıcaklık</h4>
                <h1 id="temp" class="temp">-- °C</h1>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card bg-secondary text-center p-4">
                <h4>Nem</h4>
                <h1 id="hum" class="hum">-- %</h1>
            </div>
        </div>
    </div>
    <canvas id="chart" class="mt-5"></canvas>
</div>

<script>
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [
        { label: 'Sıcaklık', data: [], borderColor: '#ff4d4f', backgroundColor: 'rgba(255,77,79,0.2)', tension: 0.3 },
        { label: 'Nem', data: [], borderColor: '#4da6ff', backgroundColor: 'rgba(77,166,255,0.2)', tension: 0.3 }
    ]},
    options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#f8fafc' } } },
        scales: { x: { ticks: { color: '#f8fafc' } }, y: { ticks: { color: '#f8fafc' } } }
    }
});

function fetchData() {
    fetch('/api/data')
        .then(res => res.json())
        .then(data => {
            document.getElementById("temp").innerText = data.temperature + " °C";
            document.getElementById("hum").innerText = data.humidity + " %";

            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(data.temperature);
            chart.data.datasets[1].data.push(data.humidity);

            if(chart.data.labels.length > 20){
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
            }

            chart.update();
        });
}

setInterval(fetchData, 3000);
</script>

</body>
</html>
